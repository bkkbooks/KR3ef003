body:
  text: 傷寒卒病論夫天布五行以運萬類人稟五常以有五臟經絡府俞陰陽會通玄冥幽微變化難極自非才高識妙豈能探其理致哉上古有神農黃帝歧伯伯高雷公少俞少師仲文中世有長桑扁鵲漢有公乘陽慶及倉公下此以往未之聞也觀今之醫不念思求經旨以演其所知各承家技終始順舊省疾問病務在口給相對斯須便處湯藥按寸不及尺握手不及足人迎趺陽三部不參動數發息不滿五十短期未知決診九候曾無倣佛明堂闕庭盡不見察所謂窺管而已夫能視死別生實為難矣孔子云生而知之者上學則亞之多聞博識知之次也余素尚方術請事斯語漢長沙守南陽張機著晉太醫令王叔和撰次傷寒例陰陽大論云凡春氣溫和夏氣暑熱秋氣漓冷冬冷冽此則四時正氣之序也注冬時嚴寒萬類深藏君子固密則不傷寒觸冒之者乃名傷寒耳例其於傷四時之氣皆能為病以傷寒為毒者以其最成殺厲之氣也中而即病者名曰傷寒中寒不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病暑病者熱極重於溫也注是以辛苦之人春夏多溫熱病皆由冬時觸寒所致非時行之氣也凡時行者春時應暖而復大寒夏時應大熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣注是以一歲之中長幼之病多相似者也此則時行之氣也夫欲候知四時正氣為病及時行疫氣之法皆當按斗曆占之九月霜降節後宜漸寒向冬大寒至正月雨水節後宜解也所以謂之雨水者以冰解而為雨水故也至驚蟄二月節後氣漸和暖向夏大熱至秋便涼從霜降以後至春分以前寒冽凡有觸冒霜露體中寒即病者謂之傷寒也九月十月寒氣尚微為病則輕十一月十二月寒冽已嚴為病則重正月二月寒漸將解為病亦輕此以冬時不調適有傷寒之人即為病也冬有非節之暖者名曰冬溫冬溫之毒與傷寒大異冬溫復有先後更相重沓亦有輕重為治不同證如後章從立春節後其中無暴大寒又不冰雪而有人壯熱為病者此屬春時陽氣發於冬時伏寒變為溫病從春分以後至秋分節前天有暴寒者皆為時行寒疫也三月四月或有暴寒其時陽氣尚弱為寒所折病熱猶輕五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦輕病與溫及暑病相似但治有殊耳十五日得一氣於四時之中一時有六氣四六名為二十四氣也然氣候亦有應至而不至或有未應至而至者或有至而太過者皆成病氣也但天地動靜陰陽鼓擊者各正一氣耳是以彼春之暖為夏之暑彼之秋之忿為冬之怒是故冬至後一陽爻升一陰爻降也夏至之後一陽氣下一陰氣上也斯則冬夏二至陰陽合也春秋二分陰陽離也陰陽交易人變病焉此君子春夏養陽秋冬養陰順天地之剛柔也小人觸冒必嬰暴疹須知毒烈之氣留在何經而發何病詳而取之是以春傷於風夏必飧泄夏傷於暑秋必病秋傷於濕冬必咳嗽冬傷於寒春必病溫此必然之道可不審明之尺寸俱浮者大陽受病也當一二日發以其脈上連風府故頭項痛腰脊強尺寸俱長者陽明受病也當二三日發以其脈夾鼻絡於目故身熱目疼鼻乾不得臥尺寸俱弦者少陽受病也當三四日發以其脈循脅絡於耳故胸脅痛而耳聾此三經皆受病未入於府者可汗而已尺寸俱沈細者大陰受病也當四五日發以其脈布胃中絡於嗌故腹滿而嗌乾尺寸俱沈者少陰受病也當五六日發以其脈貫腎絡於肺繫舌本故口燥舌乾而渴尺寸俱微緩者厥陰受病也當六七日發以其脈循陰器絡於肝故煩滿而囊縮此三經皆受病已入於府可下而已若兩感於寒者一日大陽受之即與少陰俱病則頭痛口乾煩滿而渴二日陽明受之即與大陰俱病則腹滿身熱不欲食譫語三日少陽受之即與厥陰俱病則耳聾囊縮而厥水漿不入不知人者六日死若三陰三陽五藏六府皆受病則榮衛不行府藏不通則死矣其兩感於寒更不傳經不加異氣者至七日大陽病衰頭痛少愈也八日陽明病衰身熱少歇也九日少陽病衰耳聾微聞也十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止舌乾已而嚏也十二日厥陰病衰囊縱少腹微下大氣皆去病人精神爽慧也若過十三日以上不間寸尺陷者大危若脈陰陽俱盛重感於寒者變為溫瘧陽脈浮滑陰脈濡弱者更遇於風變為風溫陽脈洪數陰脈實大者更遇溫熱變為溫毒溫毒為病最重也陽脈濡弱陰脈弦堅者更遇溫氣變為溫疫以此冬傷於寒發為溫病脈之變證方治如説夫陽盛陰虛汗之則死下之則愈陽虛陰盛汗之則愈下之則死矣夫如是則神丹安可以誤發甘遂何可以妄攻虛盛之治相背千里吉凶之機應若影響豈容易哉況桂枝下咽陽盛即斃承氣入胃陰盛以凶死生之要在乎須臾視身之盡不暇計日此陰陽虛實之交錯其候至微發汗吐下之相反其禍至速而醫術淺狹懵然不知病源為治乃誤使病者殞沒自謂其分至今冤魂塞于冥路死尸盈於曠野仁者鑒此豈不痛歟又身之穴三百六十有五其三十穴灸之有害七十九穴刺之為災並中髓也又脈四損三日死平人四息病人脈一至名曰四損脈五損一日死平人五息病人脈一至名曰五損脈六損一時死平人六息病人脈一至名曰六損脈盛身寒得之傷寒脈虛身熱得之傷暑脈陰陽俱盛大汗出不解者死脈陰陽俱虛熱不止者死脈至乍疏乍數者死脈至如轉索者其日死譫言妄語身微熱脈浮大手足溫者生逆冷脈沈細者不過一日死矣此以前是傷寒熱病證候也辨太陽病痙濕暍大陽病發熱無汗反惡寒者名曰剛痓大陽病發熱汗出而不惡寒名曰柔痓濕痺之候其人小便不利大便反快但當利其小便濕家下之額上汗出微喘小便利者死若下利不止者亦死問曰風濕相摶一身盡疼痛值天陰雨不止法當汗出而解醫曰此可汗汗之病不愈者何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗微微似欲汗出者風濕俱去也若發汗則惡寒甚加溫針則發熱甚下之則淋甚辨大陽病傷寒一日大陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者此為傳也傷寒二三日陽明少陽證不見者為不傳也若發汗已身灼熱者名風溫若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘈瘲若火熏之一逆尚引日再逆促命期病有發熱惡寒者發于陽也無熱惡寒者發于陰也發于陽者七日愈發于陰者六日愈以陽數七陰數六故也大陽病頭痛至七日以上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈大陽病欲解時從巳至未上風家表解而不了了者十二日愈病人身大熱反欲得衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也桂枝去皮三兩芍藥三兩甘草炙二兩生薑切三兩大棗擘十二枚右五味㕮咀三味以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升餘以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流離病必不除若一服汗出病差停後服不必盡劑若不汗更服依前法又不汗後服小促其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出乃服至二三劑禁生冷粘滑肉麵五辛酒酪臭惡等物葛根四兩芍藥二兩生薑切三兩甘草炙二兩大棗擘十二枚桂枝二兩右六味以水一斗先煮葛根減二升去白沫納諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥余如桂枝法將息及禁忌桂枝本為解肌若其人脈浮緊發熱汗不出者不可與之也常須識此勿令誤也若酒客病不可與桂枝湯得之則嘔以酒客不喜甘故也喘家作桂枝湯加厚朴杏子佳又服桂枝湯吐者其後必吐膿血也桂枝去皮三兩芍藥二兩甘草炙三兩生薑切三兩大棗擘十二枚附子炮去皮破八片一枚右六味以水七升煮取三升去滓溫服一升注本云桂枝湯今加附子例將息如前法桂枝去芍藥湯方桂枝去皮二兩甘草炙二兩生薑切三兩大棗擘十二枚右四味以水七升煮取三升去滓溫服一升注本云桂枝湯今去芍藥例將息如前法桂枝去芍藥加附子湯方桂枝去皮二兩甘草炙二兩生薑切三兩大棗擘十二枚附子炮去皮破八片一枚右五味以水七升煮取三升去滓溫服一升注本云桂枝湯今去芍藥加附子例將息如前法桂枝去皮一兩十六銖芍藥生薑切甘草炙麻黃去節各一兩大棗擘四枚杏仁湯積去皮尖及兩仁者二十四枚右七味以水五升先煮麻黃一二沸去上沫內諸藥煮取一升八合去滓溫服六合注本云桂枝湯三合麻黃湯三合併為六合頓服例將息如上法桂枝去皮一兩十七銖芍藥一兩六銖麻黃去節十六銖生薑切一兩六銖杏仁去皮尖十六個甘草炙一兩二銖大棗擘五枚右七味以水五升先煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升日再服注本云桂枝湯二分麻黃湯一分合為二升分再服今合為方例將息如上法桂枝二越婢一湯桂枝去皮芍藥麻黃甘草炙各十八銖大棗擘四枚生薑切一兩二銖石膏擘綿裹二十四銖右七味以水五升煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升注本云當裁為越婢湯桂枝湯合之飲一升今合為一方桂枝湯二分越婢湯一分桂枝去桂加茯苓白朮湯方芍藥三兩甘草炙二兩生薑切三兩白朮茯苓各三兩大棗擘十二枚右六味以水八升煮取三升去滓溫服一升小便利則愈注本云桂枝湯今去桂枝加茯白朮甘草乾薑湯方甘草炙四兩乾薑二兩右二味以水三升煮一升五合去滓分溫再服問曰證象陽旦按法治之而增劇厥逆咽中乾燥兩脛拘急而讝語師曰言夜半手足當溫兩腳當伸後如師言何以知此答曰寸口脈浮而大浮為風大為虛風則生微熱虛則兩脛攣病形象桂枝因加附子參其間增桂令汗出附子溫經亡陽故也厥逆咽中乾煩躁陽明內結讝語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其讝語故知病可愈辨大陽病葛根四兩麻黃去節三兩桂枝去皮二兩生薑切三兩甘草炙二兩芍藥二兩大棗擘十二枚右七味以水一斗先煮麻黃葛根減二升去白沫內諸藥煮取三升去滓溫服一升覆取似汗餘如桂枝法將息及禁忌注諸湯藥皆倣之葛根四兩麻黃去節三兩甘草炙二兩芍藥二兩桂枝去皮二兩生薑切二兩半夏洗半升大棗擘十二枚右八味以水一斗先煮葛根麻黃減二升去白沫內諸藥煮取三升去滓溫服一升覆取微似汗葛根半斤甘草炙二兩黃芩三兩黃連三兩右四味以水八升先煮葛根減二升內諸藥煮取二升去滓分溫再服麻黃去節三兩桂枝去皮二兩甘草炙一兩杏仁去皮尖七十箇右四味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗不須啜粥餘如桂枝法將息大陽與陽明合病喘而胸滿者不可下宜麻黃湯大陽病十日已去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯大青龍湯方麻黃去節六兩桂枝去皮二兩甘草炙二兩杏仁去皮尖四十枚生薑切三兩大棗擘十枚石膏碎雞子大右七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微似汗注汗出多者溫粉撲之一服汗者停後服注若復服汗多亡陽遂虛惡風煩躁不得眠也小青龍湯方麻黃去節芍藥細辛乾薑甘草炙桂枝去皮各三兩五味子半升半夏洗半升右八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升若渴去半夏加栝樓根三兩若微利去麻黃加