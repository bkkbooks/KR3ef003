不欲飲食藏府相違其病必下邪高病下故使嘔也小柴胡湯主之服柴胡湯已渴者屬陽明以法治之得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者與柴胡湯後必下重本渴飲水而嘔者柴胡湯不中與也食穀者噦小建中湯方桂枝去皮三兩甘草炙三兩大棗擘十二枚芍藥六兩生薑切三兩膠飴一升右六味以水七升煮取三升去滓內飴更上微火消解溫服一升日三服嘔家不可用建中湯以甜故也傷寒中風有柴胡證但見一證便是不必悉具凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻復發熱汗出而解柴胡二兩十六銖黃芩一兩人參一兩甘草炙一兩生薑切一兩半夏洗本云五枚二十銖大棗擘四枚芒硝二兩右八味以水四升煮取二升去滓內芒硝更煮微沸分溫再服注不解更作又方柴胡四兩龍骨黃芩生薑切鉛丹人參桂枝茯苓各一兩半半夏洗二合半大黃二兩牡蠣一兩半大棗擘六枚右十二味以水八升煮取四升內大黃切如碁子更煮一兩沸去滓溫服一升傷寒腹滿讝語寸口脈浮而緊此肝乘脾也名曰縱刺期門傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰橫刺期門桂枝去皮三兩甘草炙二兩生薑切三兩大棗擘十二枚牡蠣熬五兩蜀漆洗去醒三兩龍骨四兩右七味以水一斗二升先煮蜀漆減二升內諸藥煮取三升去滓溫服一升注本云桂枝湯今去芍藥加蜀漆牡蠣龍骨形作傷寒其脈不弦堅而弱弱者發熱弱者必渴被火必讝語弱者發熱脈浮解之當汗出愈火邪脈浮熱甚而反炙之此為實實以虛治因火而動必咽燥吐血微數之脈慎不可炙因火為邪追虛追實則為煩逆血散脈中火氣雖微內攻有力焦骨傷筋血難復也脈浮宜以汗解用火炙之邪無從出因火而盛病從腰以下必重而痺欲自解者火逆之也必當先煩煩乃有汗而解注何以知之脈浮知汗出解一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲冷食朝食暮吐以醫吐之所致也大陽病吐之但大陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也病人脈數數為熱當消穀引食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也水蛭熬虻蟲去翅足熬各三十箇桃仁去皮尖二十個大黃酒洗二兩右四味以水五升煮取三升去滓溫服一升不下更服水蛭熬二十箇虻蟲去翅足熬二十箇桃仁去皮尖二十五箇大黃三兩右四味搗分四丸以水一升煮一丸取七合服之晬時當下血若不下者更服大陽病小便利者以飲水多必心下悸小便少者必苦裏急也辨大陽病結胸問曰病在結胸有藏結其狀何如答曰按之痛寸脈浮關脈沈名曰結胸也何謂藏結答曰如結胸狀飲食如故時時下利寸脈浮關脈小細沈緊名曰藏結舌上白胎滑者難治藏結無陽證不往來寒熱其人反靜舌上胎滑者不可攻也病發于陽而反下之熱入因作結胸病發於陰而反下之因作痞也所以成結胸者以下之太早故也結胸者項亦強如柔痓狀下之則和宜大陷胸丸結胸證其脈浮大者不可下下之則死結胸證悉具煩躁者亦死大陷胸湯方大黃去皮六兩芒硝一升甘遂一錢匕右三味以水六升先煮大黃取二升去滓內芒硝煮一兩沸內甘遂末溫服一升得快利止後服大陷胸丸方大黃半斤葶藶子熬半升芒硝半升杏仁去皮尖熬黑半升右四味搗篩二味內杏仁芒硝合研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法黃連一兩半夏洗半升括蔞實大者一枚右三味以水六升先煮括蔞實取三升去滓內諸藥煮取二升去滓分溫三服脈浮者必結胸脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沈緊者必欲嘔脈沈滑者協熱利脈浮滑者必下血文蛤散文蛤五兩右一味為散以沸湯和一方寸匕服湯用五合白散桔更三分巴豆去皮去熬黑研如脂一分貝母三分右三味為散內巴豆更於臼中杵之以白飲和服強人半錢匕羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯五苓散身熱皮粟不解欲引衣自覆者若以水潠之洗之益令熱劫不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法太陽與少陽併病頸項強痛或弦冒時如結胸心下痞鞕者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語脈弦五日讝語不止當刺期門婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀讝語者此為熱入血室也當刺期門隨其實而取之婦人傷寒發熱經水適來晝日明了暮則讝語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈柴胡桂枝湯方桂枝去皮黃芩一兩半人參一兩半甘草炙一兩半夏洗二合半芍藥一兩半大棗擘六枚生薑切一兩半柴胡四兩右九味以水七升煮取三升去滓溫服一升注本云人參湯作如桂枝法加半夏柴胡黃芩復如柴胡法今用人參作各半劑柴胡桂枝乾薑湯方柴胡半斤桂枝去皮三兩乾薑二兩括樓根四兩黃芩三兩牡蠣熬二兩甘草炙二兩右七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩復服汗出便愈半夏半升黃芩乾薑人參甘草炙各三兩黃連一兩大棗擘十二枚右七味以水一斗煮取六升去滓再煮取三升溫服一升日三服芫花熬甘遂大戟右三味等分各別搗為散以水一升半先煮大棗肥者十枚取八合去滓內藥末注強人服一錢匕羸人者服半錢經溫服之平旦服若下少病不除者明日更服加半錢得快下利後糜粥自養大黃黃連瀉心湯方大黃二兩黃連黃芩各一兩右三味以麻沸湯二升漬之須臾絞去滓分溫再服