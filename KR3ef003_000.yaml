陽明病心下鞕滿者不可攻之攻之利遂不止者死利止者愈陽明病面合赤色不可攻之必發熱色黃者小便不利也陽明病不吐不下心煩者可與調胃承氣湯若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令至大泄下大承氣湯大黃酒洗四兩厚朴炙去皮半斤枳實炙五枚芒硝三合右四味以水一斗先煮二物取五升去滓內大黃更煮取二升去滓內芒硝更上微火一兩沸分溫再服注得下餘勿服小承氣湯大黃四兩厚朴炙去皮二兩枳實大者炙三枚右三味以水四升煮取一升二合去滓分溫二服注初服湯當更衣不爾者盡飲之若更衣者勿服之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉矢氣者此有燥屎也乃可攻之若不轉矢氣者此但初頭鞕後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便復鞕而少也以小承氣湯和之不轉矢氣者慎不可攻也夫實則讝語虛則鄭聲注鄭聲重語也直視讝語喘滿者死下利者亦死發汗多若重發汗者亡其陽讝語脈短者死脈自和者不死陽明病其人多汗以津液外出胃中燥大便必鞕鞕則讝語小承氣湯主之若一服讝語止者更莫復服陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉氣者更服一升若不轉氣者勿更與之明日又不大便脈反微澀者裏虛也為難治不可更與承氣湯也陽明病讝語有潮熱反不能食者胃中必有燥屎五六枚若能食者但鞕耳宜大承氣湯下之陽明病下血讝語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈汗出讝語者以有燥屎在胃中此為風須下者過經乃可下之下之若早語言必亂以表虛裏實故也下之愈宜大承氣湯傷寒四五日脈沈而喘滿沈為在裏而反發其汗津液越出大便為難表虛裏實久則讝語陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便也脈浮而遲表熱裏寒下利清穀者回逆湯主之若胃中虛冷不能食者飲水則噦脈浮發熱口乾鼻燥能食者則衄陽明病脅下鞕滿不大便而嘔舌上白胎者可與小柴胡湯上焦得通津液得下胃氣因和身濈然汗出而解陽明病自汗出若發汗小便自利者此為津液內竭雖鞕不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及大豬膽汁皆可為導蜜煎方食蜜七合右一味於銅器內微火煎當須凝如飴狀攪之勿令焦著候可丸並手捻作挺令頭鋭大如指長二寸許當熱時急作冷則鞕以內穀道中以手急抱欲大便時乃去之已試甚良疑非仲景意又大豬膽一枚瀉汁和少許法酢以灌穀道內如一食頃當大便出宿食惡物甚效陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯陽明病脈浮無汗而喘者發汗則愈宜麻黃湯茵陳蒿湯方茵陳蒿六兩梔子擘十四枚大黃二兩右三味以水一斗二升先煮茵陳減六升內二味煮取三升去滓分三服小便當利注尿如皂莢汁狀色正赤一宿腹減黃從小便去也病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯大陽病脈寸關尺緩浮弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴渴者此轉屬陽明也小便數者大便必鞕不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散脈陽微而汗出少者為自和也汗出多者為太過陽脈實因發其汗汗出多者亦為太過太過者為陽絶於裏亡津液大便因鞕也脈浮而芤浮為陽芤為陰浮芤相摶胃氣生熱其陽則絶趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相摶大便則難其脾為約麻子仁丸主之麻子仁二升芍藥半斤枳實炙半斤大黃去皮一斤厚朴去皮炙一尺杏仁去皮尖熬一升右六味蜜和丸如梧桐子大飲服十丸日三服注漸加以知為度傷寒吐後腹脹滿者與調胃承氣湯大陽病若吐若下若發汗後微煩小便數大便因鞕者與小承氣湯和之愈得病二三日脈弱無大陽柴胡證煩躁心下鞕至四五日雖能食以小承氣湯少少與之微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不受食但初頭鞕後必溏未定成鞕攻之必溏須小便利屎定鞕乃可攻之宜大承氣湯傷寒六七日目中不了了睛不和無表裏證大便難身微熱者此為實也急下之宜大承氣湯陽明病發熱汗多者急下之宜大承氣湯發汗不解腹滿痛者急下之宜大承氣湯腹滿不減減不足言當下之宜大承氣湯陽明少陽合病必下利其脈不負者為順也注負者失也互相剋賊名為負也論脈滑而數者有宿食也當下之宜大承氣湯病人無表裏證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀喜飢至六七日不大便者有瘀血宜抵當湯若脈數不解而下不止必協熱便膿血也傷寒發汗已身目為黃所以然者以寒濕在裏不解故也以為不可下也注於寒濕中求之肥梔子擘十五個甘草炙一兩黃蘗二兩右三味以水四升煮取一升半去滓分溫再服傷寒瘀熱在裏身必發黃麻黃連軺赤小豆湯主之麻黃去節二兩連軺連翹根是也二兩杏仁去皮尖四十個赤小豆一升大棗擘十二枚生梓白皮切一升生薑切二兩甘草炙二兩右八味以潦水一斗先煮麻黃再沸去上沫內諸藥煮取三升去滓分溫三服注半日服盡辨少陽病少陽病兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗此屬胃胃不和煩而悸發汗則讝語胃和則愈三陽合病脈浮大上關上但欲眠睡目合則汗傷寒六七日無大熱其人躁煩者此為陽去入陰故也傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此三陰不受邪也傷寒三日少陽脈小者欲已也少陽病欲解時從寅至辰上辨大陰病大陰中風四肢煩疼脈陽微陰澀而長者為欲愈大陰病欲解時從亥至丑上大陰病脈浮者少可發汗宜桂枝湯自利不渴者屬大陰藏有寒故也當溫之注宜服四逆輩傷寒脈浮而緩手足自溫者繫在大陰當發身黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止注以脾家實腐穢當去故也桂枝加芍藥湯桂枝去皮三兩芍藥六兩甘草炙二兩大棗擘十二枚生薑切三兩右五味以水七升煮取三升去滓溫分三服注本云桂枝湯今加芍藥桂枝加大黃湯桂枝三兩大黃二兩芍藥六兩生薑切三兩甘草二兩大棗十二枚右六味以水七升煮取三升去滓溫服一升日三服大陰為病脈弱其人續自便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也辨少陰病少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具注小便白者以下焦虛有寒不能制水故令色白也病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利少陰病咳而下利讝語者被火氣劫故也小便必難以強責少陰汗也少陰病脈細沈數病為在裏不可發汗少陰病脈微不可發汗亡陽故也陽已虛尺脈弱澀者復不可下之少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈少陰病下利若利自止惡寒而踡臥手足溫者可治少陰病惡寒而踡時自煩欲去衣被者可治少陰中風脈陽微陰浮者為欲愈少陰病欲解時從子至寅上少陰病吐利手足不逆冷反發熱者不死脈不至者炙少陰七壯少陰病八九日一身手足盡熱者以熱在膀胱必便血也少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出者是名下厥上竭為難治少陰病惡寒身踡而利手足逆冷者不治少陰病吐利躁煩四逆者死少陰病下利止而頭眩時時自冒者死少陰病四逆惡寒而身踡脈不至不煩而躁者死少陰病六七日息高者死少陰病脈微細沈但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死麻黃去節二兩細辛二兩附子炮去皮破八片一枚右三味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升日三服麻黃附子甘草湯方麻黃去節二兩甘草炙二兩附子炮去皮破八片一枚右三味以水七升先煮麻黃一兩沸去上沫內諸藥煮取三升去滓溫服一升日三服黃連四兩黃芩二兩芍藥二兩雞子黃二枚阿膠一云三挺三兩右五味以水六升先煮三物取二升去滓內膠煬盡小冷內雞子黃攪令相得溫服七合日三服附子炮去皮破八片二枚茯苓三兩人參二兩白朮四兩芍藥三兩右五味以水八升煮取三升去滓一升日三服赤石脂一半全用一半篩末一斤乾薑一兩粳米一升右三味以水七升煮米令熟去滓內赤石脂末方寸匕溫服七合日三服注若一服愈餘勿服少陰病下利便膿血者可刺吳茱萸一升人參二兩生薑切六兩大棗擘十二枚右四味以水七升煮取二升去滓溫服七合日三服豬膚一斤右一味以水一斗煮取五升去滓加白蜜一升白粉五合熬香和令相得溫分六服甘草湯方甘草二兩右一味以水三升煮取一升半去滓溫服七合日三服桔梗湯方桔梗一兩甘草二兩右二味以水三升煮取一升去滓溫分再服少陰病咽中傷生瘡不能語言聲不出者半夏苦酒湯主之半夏洗破如棗核十四枚雞子去黃內上苦酒著雞子殼中一枚右二味內半夏著苦酒中以雞子殼置刀環中安火上令三沸去滓少少含咽之不差更作三劑少陰病咽中痛半夏散及湯主之半夏洗桂枝去皮甘草炙右三味等分各別搗篩已合治之白飲和服方寸匕日三服若不能服散者以水一升煮七沸內散兩方寸匕更煮三沸下火令小冷少少咽之注半夏有毒不當散服蔥白四莖乾薑一兩附子生去皮破八片一枚右三味以水三升煮取一升去滓分溫再服蔥白四莖乾薑一兩附子生去皮破八片一枚人尿五合豬膽汁一合右五味以水三升煮取一升去滓內膽汁人尿和令相得分溫再服注若無膽亦可用茯苓三兩芍藥三兩白朮二兩生薑切三兩附子炮去皮破八片一枚右五味以水八升煮取三升去滓溫服七合日三服若咳者加五味子半升細辛一兩乾薑一兩若小便利者去茯苓若下利者去芍藥加乾薑二兩若嘔者去附子加生薑足前為半斤甘草炙二兩附子生用去皮破八片大者一枚乾薑強人可四兩三兩右三味以水三升煮取一升二合去滓分溫再服其脈即出者愈面色赤者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩注脈病皆與方相應者乃服之甘草炙枳實破水漬炙乾柴胡芍藥右四味各十分搗篩白飲和服方寸匕日三服咳者加五味子乾薑各五分并主下利悸者加桂枝五分小便不利者加茯苓五分腹中痛者加附子一枚炮令折泄利下重者先以水五升煮薤白三莖煮取三升去滓以散三方寸匕內湯中煮取一升半分溫再服豬苓茯苓阿膠澤瀉滑石各一兩右五味以水四升先煮四物取二升去滓內阿膠煬盡溫服七合日三服少陰病六七日腹脹不大便者急下之宜大承氣湯甘草炙二兩乾薑一兩半附子生用去皮破八片一枚右三味以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其背上炙之辨厥陰病厥陰中風脈微浮為欲愈不浮為未愈厥陰病欲解時從丑至卯上厥陰病渴欲飲水者少少與之愈諸四逆厥者不可下之虛家亦然傷寒先厥後發熱而利者必自止見厥復利傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日并六日亦為九日與厥陰相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痺發熱無汗而利必自止若不止必便膿血便膿血者其喉不痺傷寒二三日至四五日厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈凡厥者陰陽氣不相順接便為厥注厥者手足厥冷者是傷寒脈微而厥至七八日膚冷其人躁無暫安時者非為蛔厥也此為臟厥注蛔厥者其人當吐蛔論令病者靜而復時煩此為藏寒注蛔上入其隔故煩論須更復止得食而嘔又煩煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之注又主久利烏梅三百枚細辛六兩乾薑十兩黃連十六兩當歸四兩附子炮去皮六兩蜀椒出汗四兩桂枝去皮六兩人參六兩黃蘗六兩右十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五斗米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下丸如梧桐子大先食飲服十丸日三服稍加至二十丸禁生冷滑物臭食等傷寒熱少微厥指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也傷寒發熱四日厥反三日復熱四日厥少熱多者其病當愈四日至七日熱不除者必便膿血傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也傷寒六七日脈微手足厥冷煩躁炙厥陰厥不還者死傷寒發熱下利厥逆躁不得臥者死傷寒發熱下利至甚厥不止者死傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也傷寒五六日不結胸腹濡脈虛復厥者不可下此亡血下之死發熱而厥七日下利者為難治傷寒脈促手足厥逆者可灸之又方當歸三兩桂枝去皮三兩芍藥三兩細辛三兩甘草炙二兩通草二兩大棗擘一法十二枚二十五枚右九味以水八升煮取三升去滓溫服一升日三服當歸回逆加吳茱萸生薑附子湯方當歸三兩芍藥三兩甘草炙二兩通草二兩桂枝去皮三兩細辛三兩生薑切半斤茱萸二升大棗擘二十五枚右九味以水六升清酒六升和煮取三升去滓分溫五服大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者回逆湯主之大汗若大下利而厥冷者回逆湯主之病人手足厥冷脈乍緊者邪結在胸中心下滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散傷寒厥而心下悸宜先治水當服茯苓甘草湯卻治其厥不爾水漬入胃必作利也傷寒六七日大下後寸脈沈而遲手足厥逆與回逆湯下部脈不至咽喉不利唾膿血泄利不止者為難治屬麻黃升麻湯麻黃去節二兩半升麻一兩一分當歸一兩一分知母十八銖黃芩十八銖萎蕤一作菖蒲十八銖芍藥六銖天門冬天心六銖桂枝去皮六銖茯苓六銖甘草炙六銖石膏碎綿裹六銖白朮六銖乾薑六銖右十四味以水一斗先煮麻黃一兩沸去上沫內諸藥煮取三升去滓分溫三服相去如炊三斗米頃令盡汗出愈傷寒四五日腹中痛若轉氣下趣少腹者此欲自利也乾薑黃芩黃連人參湯方乾薑黃芩黃連人參各三兩右四味以水六升煮取二升去滓分溫再服下利有微熱而渴脈弱者令自愈下利脈數有微熱汗出令自愈設復緊為未解下利手足厥冷無脈者灸之不溫若脈不還反微喘者死小陰負趺陽者為順也下利寸脈反浮數尺中自澀者必清膿血下利脈沈弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死下利清穀下可攻表汗出必脹滿下利脈沈而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面載陽下虛故也下利脈數而渴者令自愈設不差必清膿血以有熱故也下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死傷寒下利日十餘行脈反實者死下利腹脹滿身體疼痛者先溫其裏乃攻其表溫裏宜回逆湯攻表宜桂枝湯下利欲飲水者以有熱故也白頭翁湯主之下利讝語者有燥屎也宜小承氣湯下利後更煩按之心下濡者為虛煩也宜梔子豉湯嘔家有癰膿者不可治嘔膿盡自愈嘔而脈弱小便復利有微熱見厥者難治回逆湯主之辨厥陰病霍亂傷寒其脈微澀本是霍亂今是傷寒卻四五日至陰經上轉入陰必利本嘔下利者不可治也欲以大便而反失氣仍不利此屬陽明也便必鞕十三日所以然者經盡故也下利後當便鞕鞕則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也甘草炙三兩附子生去皮破八片一枚乾薑一兩半人參一兩人參乾薑甘草炙白朮各三兩右四味搗篩蜜和為丸如雞子黃許大以沸湯數合和一丸研碎溫服之注日三四夜一服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服若臍上築者腎氣動也去朮加桂四兩吐多者去朮加生薑三兩下多者還用朮悸者加茯苓二兩渴欲得水者加朮足前成四兩半腹中痛者加人參足前成四兩半寒者加乾薑足前成四兩半腹滿者去朮加附子一枚服湯後如食頃飲熱粥一升許微自溫勿發揭衣被吐利止而身痛不休者當消息和解其外宜桂枝湯小和利之甘草炙二兩乾薑強人可四兩三兩附子生去皮破八片大者一枚豬膽汁半合右四味以水三升煮取一升二合去滓內豬膽汁分溫再服其脈即來注無豬膽以羊膽代之辨陰陽易差後勞復病枳實炙三枚梔子擘十四個豉包綿一升右三味以清漿水七升空煮取四升內枳實梔子煮取二升下豉更煮五六沸去滓溫分再服覆令微似汗注若有宿食者內大黃如博碁子五六枚服之愈牡蠣熬澤瀉蜀漆暖水洗去醒葶藶子熬商陸根熬海藻栝蔞根各等分右七味異搗下篩為散更於臼中治之白飲和服方寸匕日三服小便利止後服竹葉二把石膏一斤半夏洗半升麥門冬去心一升人參二兩甘草炙二兩粳米半升右七味以水一斗煮取六升去滓內粳米煮米熟湯成去米溫服一升日三服病人脈已解而日暮微煩以病新差人強與穀脾胃氣尚弱不能消穀故令微煩損穀則愈康平三年二月十七日侍醫丹波雅忠貞和二年十二月十五日以家祕説授典藥權助畢和氣朝臣嗣成南山隱士山秋五徂謹書
